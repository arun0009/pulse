name: Build with Maven

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ["21", "25"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: liberica
          cache: maven

      - name: Verify (format + tests + coverage + SBOM)
        run: ./mvnw -B -ntp verify --file pom.xml

      - name: Upload JaCoCo merged report
        if: always() && matrix.java-version == '21'
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-merged-report
          path: target/site/jacoco-merged/
          retention-days: 14

      - name: Upload SBOM
        if: matrix.java-version == '21'
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            target/*-sbom.json
            target/*-sbom.xml
          retention-days: 30

      - name: Update dependency graph
        # Best-effort: this submits the resolved Maven graph to GitHub's Dependency Graph
        # so Dependabot can alert on real (not just declared) deps. Failures here must never
        # fail the build — the feature can be off in repo settings, GitHub can rate-limit, etc.
        if: matrix.java-version == '21' && github.event_name == 'push'
        continue-on-error: true
        uses: advanced-security/maven-dependency-submission-action@v5

  bench:
    name: JMH (smoke run)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: liberica
          cache: maven
      - name: Run JMH (1 warmup + 1 measurement iteration)
        run: |
          ./mvnw -B -ntp -Pbench -DskipTests test-compile exec:exec \
            -Dexec.args="-classpath %classpath org.openjdk.jmh.Main -wi 1 -i 1 -f 1 -r 1s -w 1s -rf json -rff target/jmh-result.json"
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmh-result
          path: target/jmh-result.json
          retention-days: 14
