# OTel Collector configuration for the Pulse local-stack.
#
# Receives OTLP traces, metrics, and logs over HTTP (4318) and gRPC (4317).
# Exports traces to Jaeger, metrics to Prometheus, and logs to Loki.
#
# Production notes (applied here as reference):
#   - memory_limiter prevents OOM under load by dropping data before crashing
#   - retry_on_failure + sending_queue prevent transient backend outages from losing data
#   - health_check extension exposes :13133 for container healthchecks and load balancers

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  # Memory limiter — first processor in every pipeline. Prevents OOM by applying
  # back-pressure when the collector approaches the configured limit. Without this,
  # a burst of telemetry can crash the collector and lose everything in the queue.
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128

  batch:
    timeout: 5s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Resource detection — adds host.name, os.type, and container metadata to all
  # telemetry so Grafana queries can filter by infrastructure dimensions.
  resourcedetection:
    detectors: [env, system]
    timeout: 5s

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true

  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 1000

  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  debug:
    verbosity: basic

service:
  extensions: [health_check]

  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlphttp/loki]
